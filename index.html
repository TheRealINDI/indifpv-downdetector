<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiFPV Status</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
            --transition: all 0.2s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* ===== GLOW BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(88, 166, 255, 0.03) 0%, transparent 60%),
                        radial-gradient(circle at 70% 60%, rgba(63, 185, 80, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2.5rem;
            max-width: 950px;
            width: 100%;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .header-left h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f6fc 0%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-left .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.15rem;
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .badge-live {
            background: var(--accent-green);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            opacity: 0.9;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.35rem 0.9rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .refresh-btn:active {
            transform: scale(0.96);
        }

        .refresh-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin: 1.2rem 0 1.8rem 0;
            border: 1px solid var(--border-color);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .dot-green { background: var(--accent-green); }
        .dot-red { background: var(--accent-red); }
        .dot-yellow { background: var(--accent-yellow); }
        .dot-gray { background: var(--text-muted); }

        .status-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ===== TABLE ===== */
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
        }

        th {
            text-align: left;
            padding: 0.9rem 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .monitor-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .monitor-name .flag {
            font-size: 1.2rem;
        }

        /* ===== STATUS BADGES ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .status-up {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }
        .status-down {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
        }
        .status-degraded {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-yellow);
        }
        .status-paused {
            background: rgba(139, 148, 158, 0.15);
            color: var(--text-secondary);
        }

        .status-badge .dot-small {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-up .dot-small { background: var(--accent-green); }
        .status-down .dot-small { background: var(--accent-red); }
        .status-degraded .dot-small { background: var(--accent-yellow); }
        .status-paused .dot-small { background: var(--text-muted); }

        /* ===== LATENCY BAR ===== */
        .latency-bar {
            display: inline-block;
            height: 4px;
            border-radius: 4px;
            background: var(--bg-card);
            width: 60px;
            margin-right: 8px;
            vertical-align: middle;
            overflow: hidden;
        }
        .latency-bar .fill {
            height: 100%;
            border-radius: 4px;
            background: var(--accent-blue);
            transition: width 0.5s ease;
        }
        .latency-bar .fill.slow { background: var(--accent-yellow); }
        .latency-bar .fill.very-slow { background: var(--accent-red); }

        .latency-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ===== FOOTER ===== */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: var(--transition);
        }
        .footer a:hover {
            text-decoration: underline;
            color: #79c0ff;
        }

        .footer .stats {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .footer .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== LOADING / ERROR ===== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            gap: 1rem;
        }
        .loading-state .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--accent-red);
        }
        .error-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .container { padding: 1.2rem; }
            .header { flex-direction: column; }
            .header-right { width: 100%; justify-content: flex-start; }
            .status-bar { flex-direction: column; gap: 0.5rem; padding: 0.8rem 1rem; }
            th, td { padding: 0.6rem 0.7rem; font-size: 0.8rem; }
            .footer { flex-direction: column; align-items: flex-start; }
            .footer .stats { gap: 0.8rem; }
            .latency-bar { width: 40px; }
        }

        @media (max-width: 480px) {
            .container { padding: 0.8rem; border-radius: 12px; }
            .header-left h1 { font-size: 1.5rem; }
            .status-item { font-size: 0.75rem; }
            .status-badge { font-size: 0.65rem; padding: 0.1rem 0.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <h1>📡 IndiFPV Status</h1>
            <div class="subtitle">Real-time monitoring for IndiFPV services</div>
        </div>
        <div class="header-right">
            <span class="badge-live">● Live</span>
            <button class="refresh-btn" onclick="fetchStatus()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4.01 7.58 4.01 12S7.58 20 12 20c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- STATUS BAR (dynamisch gevuld) -->
    <div class="status-bar" id="statusBar">
        <div class="status-item"><span class="dot dot-green"></span> <strong id="countUp">0</strong> Online</div>
        <div class="status-item"><span class="dot dot-red"></span> <strong id="countDown">0</strong> Offline</div>
        <div class="status-item"><span class="dot dot-yellow"></span> <strong id="countDegraded">0</strong> Degraded</div>
        <div class="status-item"><span class="dot dot-gray"></span> <strong id="countTotal">0</strong> Total</div>
    </div>

    <!-- CONTENT -->
    <div id="content">
        <div class="loading-state">
            <div class="spinner"></div>
            <span>Fetching status...</span>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div>
            <span id="lastCheck">⏱ Checking...</span>
        </div>
        <div class="stats">
            <span>🔗 <a href="https://indifpv.org" target="_blank">indifpv.org</a></span>
            <span>⚡ <span id="avgLatency">--</span> avg</span>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // ⚙️ CONFIGURATION
    // ============================================================
    const API_KEY = 'ur3595791-664734f585205048bea89d5a';

    // Friendly names & flags — match EXACT names from UptimeRobot
    const REGION_MAP = {
        'IndiFPV - Amsterdam': { flag: '🇳🇱', label: 'Amsterdam' },
        'IndiFPV - Frankfurt':  { flag: '🇩🇪', label: 'Frankfurt' },
        'IndiFPV - London':     { flag: '🇬🇧', label: 'London' },
        'IndiFPV - New York':   { flag: '🇺🇸', label: 'New York' },
        'IndiFPV - Singapore':  { flag: '🇸🇬', label: 'Singapore' },
        'IndiFPV - Sydney':     { flag: '🇦🇺', label: 'Sydney' }
    };

    const STATUS_CONFIG = {
        0: { class: 'status-paused',   label: 'Paused' },
        1: { class: 'status-down',     label: 'Offline' },
        2: { class: 'status-up',       label: 'Online' },
        8: { class: 'status-degraded', label: 'Degraded' },
        9: { class: 'status-down',     label: 'Offline' }
    };

    // ============================================================
    // 🚀 FETCH STATUS
    // ============================================================
    async function fetchStatus() {
        const content = document.getElementById('content');
        const lastCheck = document.getElementById('lastCheck');

        content.innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Fetching status...</span>
            </div>
        `;

        try {
            const url = `https://api.uptimerobot.com/v2/getMonitors?api_key=${API_KEY}&format=json&logs=1&response_times=1&custom_uptime_ratios=1-7-30-365`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();

            if (data.stat !== 'ok') {
                throw new Error(data.error?.message || 'Unknown error');
            }

            if (!data.monitors || data.monitors.length === 0) {
                content.innerHTML = `
                    <div class="error-state">
                        <div class="icon">⚠️</div>
                        <h3>No monitors found</h3>
                        <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:0.3rem;">
                            Add monitors in UptimeRobot with names like "IndiFPV - Amsterdam"
                        </p>
                    </div>
                `;
                updateFooter(data.monitors || []);
                return;
            }

            renderTable(data.monitors);
            updateStatusBar(data.monitors);
            updateFooter(data.monitors);

            const now = new Date();
            lastCheck.textContent = `⏱ Last check: ${now.toLocaleString('en-US', { timeZone: 'Europe/London' })}`;

        } catch (err) {
            content.innerHTML = `
                <div class="error-state">
                    <div class="icon">❌</div>
                    <h3>Failed to fetch status</h3>
                    <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:0.3rem;">${err.message}</p>
                    <button class="refresh-btn" onclick="fetchStatus()" style="margin-top:1rem;padding:0.5rem 1.5rem;">
                        Try Again
                    </button>
                </div>
            `;
            console.error('Fetch error:', err);
        }
    }

    // ============================================================
    // 📊 RENDER TABLE
    // ============================================================
    function renderTable(monitors) {
        const content = document.getElementById('content');

        let html = `<div class="table-wrapper"><table>
            <thead><tr>
                <th>Location</th>
                <th>Status</th>
                <th>HTTP</th>
                <th>Latency</th>
                <th>Uptime (7d)</th>
            </tr></thead><tbody>`;

        monitors.forEach(m => {
            const status = STATUS_CONFIG[m.status] || STATUS_CONFIG[0];
            const region = REGION_MAP[m.friendly_name] || { flag: '🌐', label: m.friendly_name };
            const latency = m.response_times?.[0]?.value || 0;
            const uptime = m.custom_uptime_ratio?.[1] || '--';

            // Latency bar
            let barClass = '';
            let barWidth = Math.min((latency / 400) * 100, 100);
            if (latency > 300) barClass = 'very-slow';
            else if (latency > 150) barClass = 'slow';

            html += `
                <tr>
                    <td>
                        <div class="monitor-name">
                            <span class="flag">${region.flag}</span>
                            ${region.label}
                        </div>
                    </td>
                    <td><span class="status-badge ${status.class}">
                        <span class="dot-small"></span> ${status.label}
                    </span></td>
                    <td>${m.status === 2 ? '200' : '—'}</td>
                    <td>
                        <span class="latency-bar">
                            <span class="fill ${barClass}" style="width:${barWidth}%;"></span>
                        </span>
                        <span class="latency-text">${m.status === 2 ? latency + ' ms' : '—'}</span>
                    </td>
                    <td>${uptime !== '--' ? uptime + '%' : '—'}</td>
                </tr>
            `;
        });

        html += `</tbody></table></div>`;
        content.innerHTML = html;
    }

    // ============================================================
    // 📈 UPDATE STATUS BAR
    // ============================================================
    function updateStatusBar(monitors) {
        const total = monitors.length;
        const up = monitors.filter(m => m.status === 2).length;
        const down = monitors.filter(m => m.status === 1 || m.status === 9).length;
        const degraded = monitors.filter(m => m.status === 8).length;

        document.getElementById('countUp').textContent = up;
        document.getElementById('countDown').textContent = down;
        document.getElementById('countDegraded').textContent = degraded;
        document.getElementById('countTotal').textContent = total;
    }

    // ============================================================
    // 📋 UPDATE FOOTER
    // ============================================================
    function updateFooter(monitors) {
        const avg = document.getElementById('avgLatency');
        const valid = monitors
            .filter(m => m.status === 2 && m.response_times?.[0]?.value)
            .map(m => m.response_times[0].value);

        if (valid.length === 0) {
            avg.textContent = '--';
            return;
        }
        const average = Math.round(valid.reduce((a, b) => a + b, 0) / valid.length);
        avg.textContent = average + ' ms';
    }

    // ============================================================
    // 🔄 AUTO-START
    // ============================================================
    document.addEventListener('DOMContentLoaded', fetchStatus);
    setInterval(fetchStatus, 300000); // every 5 min
</script>

</body>
</html>

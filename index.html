<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiFPV Status - Europe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(88, 166, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2.5rem;
            max-width: 750px;
            width: 100%;
            box-shadow: var(--shadow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .header-left h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0f6fc 0%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-left .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.15rem;
        }

        .europe-tag {
            display: inline-block;
            background: var(--bg-card);
            color: var(--accent-blue);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-left: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .badge-live {
            background: var(--accent-green);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.35rem 0.9rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .refresh-btn:active {
            transform: scale(0.96);
        }

        .refresh-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .status-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin: 1.2rem 0 1.8rem 0;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .status-card .label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-card .value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .status-card .value.online {
            color: var(--accent-green);
        }
        .status-card .value.offline {
            color: var(--accent-red);
        }
        .status-card .value.degraded {
            color: var(--accent-yellow);
        }

        .status-card .details {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .status-card .details .item {
            text-align: center;
        }

        .status-card .details .item .num {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .status-card .details .item .lbl {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
        }

        th {
            text-align: left;
            padding: 0.9rem 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .monitor-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .status-up {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }
        .status-down {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
        }
        .status-degraded {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-yellow);
        }
        .status-paused {
            background: rgba(139, 148, 158, 0.15);
            color: var(--text-secondary);
        }

        .status-badge .dot-small {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-up .dot-small { background: var(--accent-green); }
        .status-down .dot-small { background: var(--accent-red); }
        .status-degraded .dot-small { background: var(--accent-yellow); }
        .status-paused .dot-small { background: var(--text-muted); }

        .latency-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
            color: #79c0ff;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            gap: 1rem;
        }

        .loading-state .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--accent-red);
        }

        .error-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 700px) {
            .container { padding: 1.2rem; }
            .header { flex-direction: column; }
            .header-right { width: 100%; justify-content: flex-start; }
            .status-card { flex-direction: column; align-items: stretch; text-align: center; }
            .status-card .details { justify-content: center; }
            th, td { padding: 0.6rem 0.7rem; font-size: 0.8rem; }
            .footer { flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 480px) {
            .container { padding: 0.8rem; }
            .header-left h1 { font-size: 1.5rem; }
            .status-card .value { font-size: 1.4rem; }
            .status-card .details .item .num { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <h1>📡 IndiFPV Status</h1>
            <div class="subtitle">
                Real-time monitoring from Europe
                <span class="europe-tag">🇪🇺 EU</span>
            </div>
        </div>
        <div class="header-right">
            <span class="badge-live">● Live</span>
            <button class="refresh-btn" onclick="fetchStatus()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4.01 7.58 4.01 12S7.58 20 12 20c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- STATUS CARD -->
    <div class="status-card" id="statusCard">
        <div>
            <div class="label">Current Status</div>
            <div class="value online" id="mainStatus">● Online</div>
        </div>
        <div class="details">
            <div class="item">
                <div class="num" id="uptimeDisplay">--</div>
                <div class="lbl">Uptime (7d)</div>
            </div>
            <div class="item">
                <div class="num" id="latencyDisplay">--</div>
                <div class="lbl">Latency</div>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
        <div class="loading-state">
            <div class="spinner"></div>
            <span>Fetching status...</span>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div>
            <span id="lastCheck">⏱ Checking...</span>
        </div>
        <div>
            <span>🔗 <a href="https://indifpv.org" target="_blank">indifpv.org</a></span>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // ⚙️ CONFIGURATION
    // ============================================================
    const API_KEY = 'ur3595791-664734f585205048bea89d5a';

    const STATUS_CONFIG = {
        0: { class: 'status-paused',   label: 'Paused' },
        1: { class: 'status-down',     label: 'Offline' },
        2: { class: 'status-up',       label: 'Online' },
        8: { class: 'status-degraded', label: 'Degraded' },
        9: { class: 'status-down',     label: 'Offline' }
    };

    // ============================================================
    // 🚀 FETCH STATUS - MET CORS WORKAROUND
    // ============================================================
    async function fetchStatus() {
        const content = document.getElementById('content');
        const lastCheck = document.getElementById('lastCheck');

        content.innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Fetching status...</span>
            </div>
        `;

        try {
            // Gebruik een CORS-proxy om het CORS-probleem te omzeilen
            const proxyUrl = 'https://api.allorigins.win/raw?url=';
            const apiUrl = `https://api.uptimerobot.com/v2/getMonitors?api_key=${API_KEY}&format=json&logs=1&response_times=1&custom_uptime_ratios=1-7-30-365`;
            
            const response = await fetch(proxyUrl + encodeURIComponent(apiUrl));
            
            if (!response.ok) throw new Error('Network error');
            
            const data = await response.json();

            if (!data.monitors || data.monitors.length === 0) {
                content.innerHTML = `
                    <div class="error-state">
                        <div class="icon">⚠️</div>
                        <h3>No monitors found</h3>
                        <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:0.3rem;">
                            Add a monitor in UptimeRobot with Friendly Name: <strong>"IndiFPV - Europe"</strong>
                        </p>
                    </div>
                `;
                return;
            }

            // Zoek de monitor met de juiste naam
            let monitor = data.monitors.find(m => m.friendly_name === 'IndiFPV - Europe');
            
            // Als die niet gevonden wordt, gebruik de eerste monitor
            if (!monitor) {
                monitor = data.monitors[0];
                console.log('Using first monitor:', monitor.friendly_name);
            }

            renderMonitor(monitor);
            updateStatusCard(monitor);

            const now = new Date();
            lastCheck.textContent = `⏱ Last check: ${now.toLocaleString('en-US', { timeZone: 'Europe/London' })}`;

        } catch (err) {
            content.innerHTML = `
                <div class="error-state">
                    <div class="icon">❌</div>
                    <h3>Failed to fetch status</h3>
                    <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:0.3rem;">${err.message}</p>
                    <p style="color:var(--text-secondary);font-size:0.8rem;margin-top:0.3rem;">
                        Make sure your UptimeRobot API key is correct and a monitor exists.
                    </p>
                    <button class="refresh-btn" onclick="fetchStatus()" style="margin-top:1rem;padding:0.5rem 1.5rem;">
                        Try Again
                    </button>
                </div>
            `;
            console.error('Fetch error:', err);
        }
    }

    // ============================================================
    // 📊 RENDER MONITOR
    // ============================================================
    function renderMonitor(monitor) {
        const content = document.getElementById('content');
        const status = STATUS_CONFIG[monitor.status] || STATUS_CONFIG[0];
        const latency = monitor.response_times?.[0]?.value || 0;
        const uptime = monitor.custom_uptime_ratio?.[1] || '--';

        let html = `
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Service</th>
                            <th>Status</th>
                            <th>HTTP</th>
                            <th>Latency</th>
                            <th>Uptime (7d)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="monitor-name">
                                    🇪🇺 ${monitor.friendly_name}
                                </div>
                            </td>
                            <td>
                                <span class="status-badge ${status.class}">
                                    <span class="dot-small"></span> ${status.label}
                                </span>
                            </td>
                            <td>${monitor.status === 2 ? '200' : '—'}</td>
                            <td>
                                <span class="latency-text">${monitor.status === 2 ? latency + ' ms' : '—'}</span>
                            </td>
                            <td>${uptime !== '--' ? uptime + '%' : '—'}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `;

        html += `
            <div style="margin-top:0.8rem;font-size:0.8rem;color:var(--text-secondary);text-align:center;border-top:1px solid var(--border-color);padding-top:0.8rem;">
                🌍 Monitoring from <strong>Europe</strong> · ${monitor.interval / 60} min interval
            </div>
        `;

        content.innerHTML = html;
    }

    // ============================================================
    // 📈 UPDATE STATUS CARD
    // ============================================================
    function updateStatusCard(monitor) {
        const status = STATUS_CONFIG[monitor.status] || STATUS_CONFIG[0];
        const mainStatus = document.getElementById('mainStatus');
        const uptimeDisplay = document.getElementById('uptimeDisplay');
        const latencyDisplay = document.getElementById('latencyDisplay');

        const isOnline = monitor.status === 2;
        mainStatus.textContent = isOnline ? '● Online' : '● ' + status.label;
        mainStatus.className = 'value ' + (isOnline ? 'online' : monitor.status === 8 ? 'degraded' : 'offline');

        const uptime = monitor.custom_uptime_ratio?.[1] || '--';
        uptimeDisplay.textContent = uptime !== '--' ? uptime + '%' : '--';

        const latency = monitor.response_times?.[0]?.value || 0;
        latencyDisplay.textContent = monitor.status === 2 ? latency + ' ms' : '--';
    }

    // ============================================================
    // 🔄 AUTO-START
    // ============================================================
    document.addEventListener('DOMContentLoaded', fetchStatus);
    setInterval(fetchStatus, 300000);
</script>

</body>
</html>
